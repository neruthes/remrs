<!DOCTYPE html>
<html>
<head>
    <title>Edit: [[filename]]</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: #1e1e1e; color: white; font-family: sans-serif; }
        #toolbar { padding: 10px; background: #333; display: flex; justify-content: space-between; }
        #editor { flex-grow: 1; font-family: 'JetBrains Mono NL', monospace; }
        button { background: #007acc; color: white; border: none; padding: 8px 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="toolbar">
        <span>Editing: [[filename]]</span>
        <button onclick="save()">Save (Ctrl+S)</button>
    </div>
    <textarea id="code" style="width:100%; height:90vh; background:#222; color:#fff; border:none; padding:10px;">[[content]]</textarea>

    <script>
        const token = "[[token]]";
        async function save() {
            const content = document.getElementById('code').value;
            const res = await fetch(`/?token=${token}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            const msg = await res.text();
            console.log(msg);
        }
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                save();
            }
        });
    </script>
</body>
</html>
